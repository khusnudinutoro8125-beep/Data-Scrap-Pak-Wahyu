<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#FFFFFF" />
<title>Lihat Data — Part Inspection</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.4.0/dist/exceljs.min.js"></script>
</head>
<body data-page="data">

<header class="appbar">
  <div class="appbar-inner">
    <div class="brand"><span class="logo">PI</span> Part Inspection</div>
    <nav class="nav-desktop">
      <a data-nav="input" href="index.html">Input</a>
      <a data-nav="pending" href="pending.html">Pending</a>
      <a data-nav="data" href="data.html">Lihat Data</a>
      <a data-nav="master" href="master.html">Master</a>
    </nav>
  </div>
</header>

<main class="container">
  <div class="page-head">
    <h1>Lihat Data</h1>
    <p>Ketuk foto untuk memperbesar. Klik judul kolom untuk mengurutkan. Conteng baris untuk mengunduh atau menghapus.</p>
  </div>

  <div class="filters">
    <div class="filter-field">
      <label>Part Number</label>
      <input class="input" id="fPN" placeholder="Semua…" autocomplete="off" />
    </div>
    <div class="filter-field">
      <label>Part Name</label>
      <input class="input" id="fName" placeholder="Semua…" autocomplete="off" />
    </div>
    <div class="filter-field">
      <label>Dari</label>
      <input class="input" id="fFrom" type="date" />
    </div>
    <div class="filter-field">
      <label>Sampai</label>
      <input class="input" id="fTo" type="date" />
    </div>
    <div class="filter-actions">
      <button class="btn btn-ghost btn-sm" id="fReset">Reset</button>
      <button class="btn btn-secondary btn-sm" id="refresh">Muat ulang</button>
      <button class="btn btn-danger btn-sm" id="delete" disabled>Hapus</button>
      <button class="btn btn-primary btn-sm" id="export" disabled>
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4M4 19h16"/></svg>
        Unduh Excel<span id="expN"></span>
      </button>
    </div>
  </div>

  <div class="result-bar">
    <span id="resultInfo"></span>
    <span class="sel-group" id="selGroup" hidden>
      <span class="sel-badge" id="selInfo"></span>
      <button class="linkbtn" id="clearSel">Hapus semua conteng</button>
    </span>
  </div>

  <div id="tableArea"></div>
</main>

<nav class="tabbar">
  <a data-nav="input" href="index.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>Input</a>
  <a data-nav="pending" href="pending.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Pending</a>
  <a data-nav="data" href="data.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 10h18M9 4v16"/></svg>Data</a>
  <a data-nav="master" href="master.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="8" ry="3"/><path d="M4 5v14c0 1.7 3.6 3 8 3s8-1.3 8-3V5"/><path d="M4 12c0 1.7 3.6 3 8 3s8-1.3 8-3"/></svg>Master</a>
</nav>

<script src="config.js"></script>
<script src="db.js"></script>
<script src="api.js"></script>
<script src="common.js"></script>
<script src="data.js"></script>
</body>
</html>
